# SOLO event 2022-03-03 12:00 UT (SC time)
irap:
  spacecraft: SOLO
  spacecraft_time: '2022-03-03T12:00:00'
  coronal_model: ADAPT
  mode: SUNTIME
  realization_adapt: 0
  prob_threshold_pct: 60
  carrington_roi: {lon: [10, 100], lat: [-60, 30]}
  adapt_cache_dir: /disk/plasma/xw2/PFSS/data/adapt_gong
  selenium_chrome_binary: /usr/bin/google-chrome

results_root: /disk/plasma/xw2/PFSS/results
aia_data_dir: /disk/plasma/xw2/sunpy/data
aia_prep_dir: /disk/plasma/xw2/sunpy/data/aia_prep

aia:
  jsoc_notify: xiangyu.wu.23@ucl.ac.uk

dem:
  roi:
    bottom_left_arcsec: [-550, -300]
    top_right_arcsec: [200, 450]
  region_type: 'custom'
  logT_range: [5.5, 6.4]

plots:
  dpi: 300
runtime:
  log_level: INFO


extract:
  overlay_carrington_roi:
    lon: [30, 60]
    lat: [-30, 0]
  # overlay_carrington_pixel_scale_deg: 0.024  # cross-check; commented to use native default 0.036
